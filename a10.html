<!DOCTYPE html>
<html>
<head>
    <title>A10 - Cookie Assignment</title>
    <script>
    function setCookie(cname,cvalue,exdays) {
      const d = new Date();
      d.setTime(d.getTime() + (exdays*24*60*60*1000));
      let expires = "expires=" + d.toUTCString();
      document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/;SameSite=Lax";
    }

    function getCookie(cname) {
      let name = cname + "=";
      let decodedCookie = decodeURIComponent(document.cookie);
      let ca = decodedCookie.split(';');
      for(let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') {
          c = c.substring(1);
        }
        if (c.indexOf(name) == 0) {
          return c.substring(name.length, c.length);
        }
      }
      return "";
    }

    function checkCookie() {
      let user = getCookie("username");
      if (user != "") {
        alert("Welcome again " + user);
        document.getElementById("welcome-msg").innerText = "Welcome back, " + user + "!";
      } else {
         user = prompt("Please enter your name:","");
         if (user != "" && user != null) {
           setCookie("username", user, 30);
         }
      }
    }
    </script>
</head>

<body onload="checkCookie()" style="font-family: sans-serif; text-align: center; padding-top: 50px;">

    <h1>Assignment A10: JavaScript Cookies</h1>
    <p id="welcome-msg">Please refresh the page to test the cookie logic.</p>

</body>
</html>
